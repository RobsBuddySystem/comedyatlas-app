<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Shows — COMEDY ATLAS</title>
<meta name="description" content="Every upcoming stand-up comedy show tracked by COMEDY ATLAS, worldwide, on one calendar.">
<link rel="canonical" href="https://comedyatlas.app/shows.html">
<style>
:root{
  --purple:#7c3aed;--purple-light:#9d5ff5;
  --bg:#0a0e1a;--card:#111827;--border:#1e2a3a;--border2:#2a3a4e;
  --text:#f0f0f0;--muted:#8899aa;--dim:#5b6b7a;
  --gold:#c9a84c;--gold-light:#e8c96a;
  --red:#c41e3a;--green:#3fb950;
  --grad:linear-gradient(135deg,#7c3aed 0%,#c9a84c 100%);
}
@media (prefers-color-scheme: light){
  :root{--bg:#f7f5f0;--card:#ffffff;--border:#e2ddd2;--border2:#d5cfc2;--text:#171512;--muted:#5a5348;--dim:#8a8272}
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;flex-wrap:wrap;gap:8px}
.nav-logo{font-size:16px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.nav-logo .dot{color:var(--gold)}
.nav-links{display:flex;gap:20px;font-size:14px;color:var(--muted);flex-wrap:wrap}
.nav-links a{transition:color .15s}.nav-links a:hover{color:var(--text)}
.skip-link{position:absolute;left:-9999px;top:0;background:var(--card);color:var(--text);padding:10px 16px;z-index:1000;border-radius:0 0 8px 0;font-size:13px;font-weight:700}
.skip-link:focus{left:0}
.nav-links a.nav-active{color:var(--text)!important;font-weight:700;text-decoration:underline;text-underline-offset:4px}
.hero{text-align:center;padding:44px 24px 6px}
.hero h1{font-size:clamp(28px,5vw,46px);font-weight:800;letter-spacing:-1px;line-height:1.05;margin-bottom:10px}
.hero h1 .g{color:var(--gold)}
.hero p{color:var(--muted);font-size:15px;max-width:560px;margin:0 auto}
.freshness{max-width:1100px;margin:14px auto 0;padding:0 20px;font-size:13px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.freshness .dot-live{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}
.freshness .dot-live.stale{background:var(--red)}
.calwrap{max-width:1240px;margin:0 auto;padding:22px 16px 70px}
.calbar{display:flex;align-items:center;justify-content:center;gap:14px;margin:18px 0 20px;flex-wrap:wrap}
.navbtn{background:var(--card);border:1px solid var(--border);color:var(--text);width:42px;height:42px;border-radius:12px;font-size:20px;cursor:pointer;line-height:1;transition:.18s}
.navbtn:hover{border-color:var(--purple)}
.month{font-size:22px;font-weight:800;letter-spacing:-.4px;min-width:220px;text-align:center}
.today-btn{height:42px;padding:0 20px;border-radius:12px;border:0;font-size:14px;font-weight:800;cursor:pointer;color:#fff;background:var(--grad)}
.today-btn:hover{opacity:.9}
.filterbar{display:flex;align-items:center;justify-content:center;gap:10px;margin:0 0 18px;flex-wrap:wrap}
.filterbar select{height:38px;padding:0 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:600;cursor:pointer}
.filterbar select:hover{border-color:var(--border2)}
.filterbar .clear-filters{height:38px;padding:0 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer}
.filterbar .clear-filters:hover{border-color:var(--border2);color:var(--text)}
.filterbar .near-btn{height:38px;padding:0 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-weight:700;cursor:pointer}
.filterbar .near-btn:hover{border-color:var(--purple)}
.filterbar .near-btn.active{background:var(--grad);border-color:transparent;color:#fff}
.near-note{width:100%;text-align:center;font-size:12px;color:var(--muted);margin-top:-8px}
.calscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:16px}
.cal{min-width:900px;display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.dow{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);text-align:center;padding:6px 0 10px}
.cell{background:var(--card);border:1px solid var(--border);border-radius:14px;min-height:132px;max-height:340px;overflow-y:auto;padding:9px;display:flex;flex-direction:column;gap:7px;transition:.18s}
.cell:hover{border-color:var(--border2)}
.cell.blank{background:transparent;border:0}
.cell.past{opacity:.38}
.cell.today{border:1px solid var(--gold)}
.cell.dow-dimmed{opacity:.3}
.cell-more{display:block;width:100%;background:transparent;border:1px dashed var(--border2);color:var(--muted);border-radius:8px;padding:5px 0;font-size:10.5px;font-weight:800;cursor:pointer;text-align:center;transition:.15s}
.cell-more:hover{border-color:var(--purple);color:var(--text)}
.ev-count{font-size:9px;font-weight:800;color:var(--dim);background:rgba(124,58,237,.1);border-radius:6px;padding:1px 5px}
.cell-top{display:flex;align-items:center;justify-content:space-between}
.cell-date{font-size:12px;color:var(--dim);font-weight:800}
.cell.today .cell-date{color:var(--gold)}
.today-pill{font-size:9px;font-weight:900;letter-spacing:.08em;padding:2px 7px;border-radius:20px;color:#100c00;background:var(--gold)}
.ev{display:block;background:rgba(124,58,237,.08);border:1px solid var(--border);border-radius:10px;padding:7px 9px;transition:.16s;position:relative;overflow:hidden}
.ev:hover{border-color:var(--purple)}
.ev-time{font-size:11px;font-weight:900;color:var(--gold-light)}
.ev-name{font-size:12.5px;font-weight:700;line-height:1.25;margin-top:1px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ev-venue{font-size:10px;color:var(--muted);margin-top:2px}
.ev-city{display:inline-block;font-size:8.5px;font-weight:800;padding:1px 6px;border-radius:6px;margin-top:4px;background:rgba(124,58,237,.16);color:var(--purple-light)}
.ev-ok{display:inline-block;font-size:8.5px;font-weight:800;padding:1px 6px;border-radius:6px;margin-top:4px;margin-left:4px;background:rgba(63,185,80,.16);color:var(--green)}
.cell-empty{font-size:10px;color:var(--dim);margin-top:auto;font-style:italic}
@media(max-width:640px){.hero{padding:34px 16px 4px}.month{min-width:150px;font-size:18px}}
footer{border-top:1px solid var(--border);padding:28px 24px;text-align:center;color:var(--muted);font-size:13px}
footer a{color:var(--muted)}footer a:hover{color:var(--text)}
.footer-links{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
</style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to content</a>
<nav>
  <a href="/" class="nav-logo">COMEDY ATLAS<span class="dot">.</span></a>
  <div class="nav-links">
    <a href="/shows.html" class="nav-active" aria-current="page">Shows</a>
    <a href="/comedy-atlas/partners.html">Partners</a>
    <a href="/comedy-atlas/blog/">Blog</a>

    <a href="/comedy-atlas/login.html">Log in</a>
  </div>
</nav>

<div class="hero" id="main-content">
  <h1>Comedy <span class="g">Calendar</span></h1>
  <p>Every upcoming stand-up show tracked by COMEDY ATLAS, worldwide. Tap any show for the organizer's official ticket page.</p>
</div>

<div class="freshness" id="freshness">
  <span class="dot-live" id="freshness-dot"></span>
  <span id="freshness-text">Checking data freshness…</span>
</div>

<div class="calwrap">
  <div class="calbar">
    <button class="navbtn" id="prev" aria-label="Previous month">&#8249;</button>
    <div class="month" id="monthLabel">—</div>
    <button class="navbtn" id="next" aria-label="Next month">&#8250;</button>
    <button class="today-btn" id="todayBtn">Today</button>
  </div>
  <div class="filterbar">
    <select id="dowFilter" aria-label="Filter by day of week">
      <option value="">Every day</option>
      <option value="0">Sundays</option>
      <option value="1">Mondays</option>
      <option value="2">Tuesdays</option>
      <option value="3">Wednesdays</option>
      <option value="4">Thursdays</option>
      <option value="5">Fridays</option>
      <option value="6">Saturdays</option>
    </select>
    <select id="todFilter" aria-label="Filter by time of day">
      <option value="">Any time</option>
      <option value="morning">Morning (4am–12pm)</option>
      <option value="afternoon">Afternoon (12–5pm)</option>
      <option value="evening">Evening (5–9pm)</option>
      <option value="late">Late night (9pm–4am)</option>
    </select>
    <select id="cityFilter" aria-label="Filter by city">
      <option value="">All cities</option>
    </select>
    <button type="button" class="near-btn" id="nearMeBtn">📍 Near me</button>
    <button type="button" class="clear-filters" id="clearFilters">Clear filters</button>
    <div class="near-note" id="nearNote"></div>
  </div>
  <div class="calscroll">
    <div class="cal" id="cal"></div>
  </div>
</div>

<footer>
  <div class="footer-links">
    <a href="/comedy-atlas/">Home</a>
    <a href="/shows.html">Shows</a>
  </div>
  <div>
    <a href="https://www.instagram.com/comedyatlasapp/" target="_blank" rel="noopener">Instagram</a>
    &nbsp;·&nbsp;
    <a href="mailto:contact@comedyatlas.app">contact@comedyatlas.app</a>
  </div>
  <div class="footer-feedback-cta" style="margin-top:8px">
    <button type="button" onclick="if(window.AtlasFeedback)window.AtlasFeedback.open({subject:'suggestion'})"
      style="background:none;border:none;padding:0;font:inherit;color:inherit;text-decoration:underline;cursor:pointer">
      Is something missing? Send us a message</button>
  </div>
</footer>

<script src="comedy-atlas/atlas-track.js"></script>
<script src="comedy-atlas/atlas-common.js"></script>
<script src="comedy-atlas/atlas-feedback.js"></script>
<script>
(function () {
"use strict";
var A = window.AtlasCommon;
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
let SHOWS = [];
let view = new Date(); view.setDate(1);

const TODAY = A.parisNow().toLocaleDateString('sv-SE');

// Per-cell display cap (Robert, 2026-07-18): day columns were getting
// extremely long with everything a busy day tracks. Cap the always-visible
// count and let a "+ N more" toggle expand the cell on demand instead of
// blowing out the grid row height for every other day in the month.
const CELL_CAP = 4;
const expandedCells = {};

const state = { dow: '', tod: '', city: '', near: null };
// near = null (off) or { lat, lon, cityName } once geolocation resolves --
// cityName is the nearest known-city centroid within CITY_NEAR_RADIUS_KM,
// used as the city-level fallback for shows whose venue has no lat/lon
// (venue coordinate coverage is ~64% overall; Berlin/London/Edinburgh are
// mostly missing -- see BUILD_STATE.md). null cityName means the user
// isn't within range of any city we track, so only venue-coordinate
// matches apply.
const VENUE_NEAR_RADIUS_KM = 25;
const CITY_NEAR_RADIUS_KM = 60; // generous metro-area buffer for the fallback
let CITIES = [];

function dateKeySv(d){
  // parisDateKey() from atlas-common uses en-GB (dd/mm/yyyy); we need a
  // sortable sv-SE (yyyy-mm-dd) key to match the calendar grid's own dates.
  return d.toLocaleDateString('sv-SE', { timeZone: 'Europe/Paris' });
}

function parisHourOf(d){
  return Number(d.toLocaleString('en-GB', { timeZone: 'Europe/Paris', hour: '2-digit', hour12: false }));
}

// "Tonight" extends past midnight to 4am (Robert, 2026-07-18, nightlife
// convention -- a show starting at 1am still belongs to the PREVIOUS
// calendar day's cell, not the next one). Mirrors the exact cutoff used by
// atlas-common.js's makeTimeBuckets()/tonight and apps/atlas_api/main.py's
// /shows/near default window, applied here to which cell a show renders
// under rather than to a "now"-relative window.
function cellDateKey(d){
  if (parisHourOf(d) < 4) {
    const shifted = new Date(d.getTime());
    shifted.setDate(shifted.getDate() - 1);
    return dateKeySv(shifted);
  }
  return dateKeySv(d);
}

async function loadShows(){
  try {
    const events = await A.fetchEvents();
    SHOWS = events.filter(function (ev) {
      return ev.canonical_event_url && ev.starts_at;
    }).map(function (ev) {
      const d = new Date(ev.starts_at);
      const urlObj = new URL(ev.canonical_event_url);
      return {
        title: ev.title || 'Untitled show',
        venue: ev.venue_name || '',
        city: ev.city_name || '',
        lat: typeof ev.venue_latitude === 'number' ? ev.venue_latitude : null,
        lon: typeof ev.venue_longitude === 'number' ? ev.venue_longitude : null,
        org: ev.organization_name || '',
        seriesId: ev.show_series_id != null ? ev.show_series_id : null,
        url: ev.canonical_event_url,
        slug: ev.slug || '',
        eventId: ev.id,
        ticketHost: urlObj.hostname.toLowerCase().replace(/^www\./, ''),
        date: d,
        dateKey: isNaN(d.getTime()) ? '' : cellDateKey(d),
        time: isNaN(d.getTime()) ? '' : A.fmtTime(d),
        verified: ev.status !== 'cancelled'
      };
    });
  } catch (e) { console.warn('[atlas] fetchEvents failed', e); SHOWS = []; }
  populateCityFilter();
  render(); scrollToToday();
  A.fetchManifest().then(function (m) {
    A.setFreshness(document.getElementById('freshness-dot'), document.getElementById('freshness-text'), m);
  });
}

// City dropdown lists exactly the cities present in the loaded shows data
// (not the full 117-row cities.json -- an empty-of-shows city in that list
// would be a dead filter option), alphabetical.
function populateCityFilter(){
  const sel = document.getElementById('cityFilter');
  const current = sel.value;
  const cities = Array.from(new Set(SHOWS.map(s => s.city).filter(Boolean))).sort();
  sel.innerHTML = '<option value="">All cities</option>' +
    cities.map(c => `<option value="${A.escapeHtml(c)}">${A.escapeHtml(c)}</option>`).join('');
  if (cities.indexOf(current) !== -1) sel.value = current;
}

// Groups by the same identity (show_series_id, or org+title fallback --
// same convention as atlas-common.js's groupEventsByShow) + same venue and
// clock time, so a show that legitimately runs twice in one night (e.g.
// 8pm and 10pm sets) still shows as two cards, but a show duplicated in the
// feed under identical time/venue collapses into ONE card instead of N
// identical ones (Robert, 2026-07-18).
function dedupe(evs){
  const seen = {}; const order = [];
  evs.forEach(function (s) {
    const key = (s.seriesId != null ? 'series:' + s.seriesId : 'orgtitle:' + s.org + '||' + s.title)
      + '||' + s.venue + '||' + s.time;
    if (!seen[key]) { seen[key] = s; order.push(key); }
  });
  return order.map(k => seen[k]);
}

function matchesFilters(s){
  // Weekday is derived from the show's own (already 4am-shifted) cell date
  // key rather than the raw Date object's local getDay() -- the key is a
  // plain yyyy-mm-dd Paris-calendar day, so parsing it at local noon avoids
  // any UTC/local timezone-offset day-boundary mismatch.
  if (state.dow !== '' && s.dateKey && String(new Date(s.dateKey + 'T12:00:00').getDay()) !== state.dow) return false;
  if (state.tod) {
    const buckets = A.makeTimeBuckets();
    if (!buckets.timeOfDay(s.date, state.tod)) return false;
  }
  if (state.city && s.city !== state.city) return false;
  if (state.near) {
    // Prefer real venue coordinates when this show has them: 25km radius,
    // exact. When the venue has no coordinates (the majority case outside
    // Paris -- ~64% overall coverage), fall back to city-level matching
    // against the user's nearest known city rather than dropping the show
    // outright -- a pure city filter would have kept it, so near-me must
    // not be strictly worse than that.
    if (s.lat != null && s.lon != null) {
      if (A.distanceKm(state.near.lat, state.near.lon, s.lat, s.lon) > VENUE_NEAR_RADIUS_KM) return false;
    } else if (state.near.cityName) {
      if (s.city !== state.near.cityName) return false;
    } else {
      return false; // no venue coords AND user isn't near any known city
    }
  }
  return true;
}

function showsOn(date){
  const ds = dateKeySv(date);
  const evs = SHOWS.filter(s => s.dateKey === ds && matchesFilters(s));
  return dedupe(evs).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
}

function render(){
  const y=view.getFullYear(), m=view.getMonth();
  document.getElementById('monthLabel').textContent = MONTHS[m]+' '+y;
  const cal=document.getElementById('cal'); cal.innerHTML='';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{
    const h=document.createElement('div'); h.className='dow'; h.textContent=d; cal.appendChild(h);
  });
  const first=new Date(y,m,1); const pad=first.getDay(); const dim=new Date(y,m+1,0).getDate();
  for(let i=0;i<pad;i++){ const b=document.createElement('div'); b.className='cell blank'; cal.appendChild(b); }
  for(let d=1; d<=dim; d++){
    const date=new Date(y,m,d); const ds=date.toLocaleDateString('sv-SE');
    const cell=document.createElement('div'); cell.className='cell';
    if(ds<TODAY) cell.className+=' past';
    if(ds===TODAY){ cell.className+=' today'; cell.id='todayCell'; }
    // Day-of-week filter dims (rather than hides) non-matching cells --
    // keeps the grid's shape/navigation intact while visually collapsing
    // attention onto the chosen weekday, e.g. "only Fridays" (Robert,
    // 2026-07-18).
    if (state.dow !== '' && String(date.getDay()) !== state.dow) cell.className += ' dow-dimmed';
    const top=document.createElement('div'); top.className='cell-top';
    top.innerHTML = `<span class="cell-date">${d}</span>` + (ds===TODAY?'<span class="today-pill">TODAY</span>':'');
    cell.appendChild(top);
    const evs = showsOn(date);
    const cellKey = ds;
    const isExpanded = !!expandedCells[cellKey];
    // Listing diversity (2026-07-19, Robert: "JK Comedy Club Soho has the
    // only visibility for London -- there needs to be a way to show other
    // venues/shows"): a busy day's CELL_CAP used to just take the first
    // few by time, which on a JK-heavy day meant the always-visible cards
    // were all JK. Round-robin by venue FIRST (A.roundRobinByKey, shared
    // with atlas-common.js's own city-page/homepage diversity fix),
    // seeded by this cell's own date key so the pick is stable per day,
    // THEN cap -- a different venue's show on the same day now has a real
    // chance to be one of the always-visible cards instead of "+N more".
    const diversified = A.roundRobinByKey
      ? A.roundRobinByKey(evs, function (s) { return s.venue || s.org || ''; }, cellKey)
      : evs;
    const capped = isExpanded ? diversified : diversified.slice(0, CELL_CAP);
    capped.forEach(s=>{
      const a=document.createElement('a'); a.className='ev';
      // Every card must land on our OWN event page first (Phase 3b D1,
      // mirrors comedy-atlas/atlas-common.js's renderEventCards): if the
      // event has a slug, link straight to /comedy-atlas/event/<slug>/,
      // opened in the same tab. Only fall back to the click-tracked
      // go.html redirector -- passing the ticket HOST, never the raw
      // dest URL, since go.html's allowlist check compares `dest` against
      // bare hostnames -- for events backfill_slugs.py hasn't reached yet.
      if (s.slug) {
        a.href = '/comedy-atlas/event/' + encodeURIComponent(s.slug) + '/';
      } else {
        a.href = '/comedy-atlas/go.html?e=' + encodeURIComponent(s.eventId) +
          (s.ticketHost ? '&dest=' + encodeURIComponent(s.ticketHost) : '');
        a.target = '_blank'; a.rel = 'noopener noreferrer';
      }
      a.innerHTML = `<div class="ev-time">${s.time||''}</div>`
        + `<div class="ev-name">${A.escapeHtml(s.title)}</div>`
        + (s.venue?`<div class="ev-venue">${A.escapeHtml(s.venue)}</div>`:'')
        + (s.city?`<span class="ev-city">${A.escapeHtml(s.city)}</span>`:'')
        + (s.verified?`<span class="ev-ok">✓ verified</span>`:'');
      cell.appendChild(a);
    });
    // Cap+expander (Robert, 2026-07-18): keeps every day column a fixed,
    // manageable height by default -- a busy day expands in place on
    // click instead of stretching its whole row (and every cell beside
    // it) to fit N cards.
    if (evs.length > CELL_CAP) {
      const more=document.createElement('button');
      more.type='button'; more.className='cell-more';
      more.textContent = isExpanded ? 'Show less' : `+ ${evs.length - CELL_CAP} more`;
      more.addEventListener('click', function(){
        if (expandedCells[cellKey]) { delete expandedCells[cellKey]; } else { expandedCells[cellKey] = true; }
        render();
      });
      cell.appendChild(more);
    }
    if(ds===TODAY && !evs.length){ const e=document.createElement('div'); e.className='cell-empty'; e.textContent='No tracked show today'; cell.appendChild(e); }
    cal.appendChild(cell);
  }
}
function scrollToToday(){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const t=document.getElementById('todayCell'); if(!t) return;
    const y=t.getBoundingClientRect().top + window.pageYOffset - 96;
    if(y>40) window.scrollTo({top:y,behavior:'smooth'});
  }));
}
document.getElementById('prev').onclick=()=>{ view.setMonth(view.getMonth()-1); render(); };
document.getElementById('next').onclick=()=>{ view.setMonth(view.getMonth()+1); render(); };
document.getElementById('todayBtn').onclick=()=>{ view=new Date(); view.setDate(1); render(); scrollToToday(); };
document.getElementById('dowFilter').onchange=(e)=>{ state.dow = e.target.value; render(); };
document.getElementById('todFilter').onchange=(e)=>{ state.tod = e.target.value; render(); };
document.getElementById('cityFilter').onchange=(e)=>{
  state.city = e.target.value;
  // City picker and "Near me" are alternate ways to set the SAME location
  // filter, not two filters that stack -- picking a city while near-me is
  // active would otherwise silently AND them down to (near AND that city),
  // which reads as a bug ("I picked London but see nothing"), not a
  // feature. Picking a city always wins and turns near-me off.
  if (state.city) { state.near = null; setNearActive(false); document.getElementById('nearNote').textContent = ''; }
  render();
};

function setNearActive(on){
  document.getElementById('nearMeBtn').classList.toggle('active', on);
}

function nearestCityWithinRadius(lat, lon){
  if (!CITIES.length) return null;
  let best = null, bestDist = Infinity;
  CITIES.forEach(c => {
    if (typeof c.latitude !== 'number' || typeof c.longitude !== 'number') return;
    const dist = A.distanceKm(lat, lon, c.latitude, c.longitude);
    if (dist < bestDist) { bestDist = dist; best = c.name; }
  });
  return bestDist <= CITY_NEAR_RADIUS_KM ? best : null;
}

document.getElementById('nearMeBtn').onclick = () => {
  const note = document.getElementById('nearNote');
  if (state.near) { // toggle off
    state.near = null; setNearActive(false); note.textContent = '';
    render();
    return;
  }
  if (!('geolocation' in navigator)) {
    note.textContent = "Your browser doesn't support location — use the city dropdown instead.";
    return;
  }
  note.textContent = 'Finding your location…';
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const lat = pos.coords.latitude, lon = pos.coords.longitude;
      if (!CITIES.length) {
        const c = await A.fetchCities();
        CITIES = Array.isArray(c) ? c : [];
      }
      const cityName = nearestCityWithinRadius(lat, lon);
      state.near = { lat: lat, lon: lon, cityName: cityName };
      state.city = ''; document.getElementById('cityFilter').value = '';
      setNearActive(true);
      note.textContent = cityName
        ? `Showing shows within ${VENUE_NEAR_RADIUS_KM}km, plus other ${cityName} listings.`
        : "Showing shows with a known location within " + VENUE_NEAR_RADIUS_KM + "km — you're not near a city we track yet.";
      render();
    },
    () => {
      note.textContent = 'Location access was denied — no problem, use the city dropdown instead.';
    },
    { timeout: 8000, maximumAge: 300000 }
  );
};

document.getElementById('clearFilters').onclick=()=>{
  state.dow=''; state.tod=''; state.city=''; state.near=null;
  document.getElementById('dowFilter').value='';
  document.getElementById('todFilter').value='';
  document.getElementById('cityFilter').value='';
  setNearActive(false);
  document.getElementById('nearNote').textContent = '';
  render();
};
loadShows();
})();
</script>
</body>
</html>
